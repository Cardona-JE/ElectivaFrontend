version: '3.8'

services:
  frontend:
    build: .
    container_name: frontend-app
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend-api:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cine-network

networks:
  cine-network:
    external: true
    name: cine-network
